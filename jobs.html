    <!-- Main Content -->

        <div class="row">

                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white fw-bold">

                    </div>
                    <div class="card-body">
                        <!-- Địa điểm -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Địa điểm</label>
                            <select class="form-select" id="filterLocation" onchange="applyFilter()">

                                <option value="hanoi">Hà Nội</option>
                                <option value="hcm">Hồ Chí Minh</option>
                                <option value="danang">Đà Nẵng</option>
                            </select>
                        </div>
                        
                        <!-- Loại hình -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Loại hình</label>
                            <select class="form-select" id="filterType" onchange="applyFilter()">
                                <option value="all">Tất cả</option>
                                <option value="remote">Online / Remote</option>
                                <option value="office">Tại văn phòng</option>
                                <option value="intern">Thực tập sinh</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">Mức lương</label>
                            <select class="form-select" id="filterSalary" onchange="applyFilter()">

                                <option value="high">Trên 20 Triệu</option>
                                <option value="mid">10 - 20 Triệu</option>
                            </select>
                        </div>

                         Công việc nổi bậc

        // 2. HÀM RENDER (IN RA MÀN HÌNH)
        function renderJobs(data) {
            const container = document.getElementById('jobListContainer');
            const countLabel = document.getElementById('jobCount');
            
            container.innerHTML = ""; // Xóa nội dung cũ
            countLabel.innerText = data.length; // Cập nhật số lượng

            if (data.length === 0) {
                container.innerHTML = `<div class="alert alert-warning text-center">Không tìm thấy công việc phù hợp với bộ lọc này.</div>`;
                return;
            }

            data.forEach(job => {
                // Xử lý hiển thị địa điểm đẹp hơn
                let locText = "";
                if(job.loc === 'hanoi') locText = "Hà Nội";
                else if(job.loc === 'hcm') locText = "TP.HCM";
                else locText = "Đà Nẵng";

                // Code HTML cho từng thẻ việc làm
                // Lưu ý class "logo-box" ở thẻ div bao quanh ảnh
                const html = `
                    <div class="card border-0 shadow-sm mb-3 job-card p-3">
                        <div class="row align-items-center">
                            <div class="col-md-2 d-flex justify-content-center mb-3 mb-md-0">
                                <div class="logo-box">
                                    <img src="${job.logoUrl}" alt="${job.company}">
                                </div>
                            </div>
                            <div class="col-md-7">
                                <h5 class="card-title fw-bold text-primary mb-1">
                                    <a href="#" class="text-decoration-none">${job.title}</a>
                                </h5>
                                <p class="mb-2 fw-bold text-dark small">${job.company}</p>
                                <div class="text-muted small">
                                    <span class="me-3"><i class="fas fa-dollar-sign text-success"></i> ${job.salary}</span>
                                    <span class="me-3"><i class="fas fa-map-marker-alt text-danger"></i> ${locText}</span>
                                    <span class="badge bg-light text-dark border">${job.type === 'remote' ? 'Online' : (job.type === 'intern' ? 'Thực tập' : 'Văn phòng')}</span>
                                </div>
                            </div>
                            <div class="col-md-3 text-end">
                                <button class="btn btn-outline-primary w-100 fw-bold">Ứng tuyển</button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // 3. HÀM KHỞI TẠO (CHẠY KHI VỪA VÀO TRANG)
        function init() {
            // Lấy tham số từ thanh địa chỉ (URL) do trang index gửi sang
            const urlParams = new URLSearchParams(window.location.search);
            const typeParam = urlParams.get('type');
            const locParam = urlParams.get('location');
            const salaryParam = urlParams.get('salary');

            // Cập nhật giao diện Dropdown bên trái cho đúng
            if(locParam) document.getElementById('filterLocation').value = locParam;
            if(typeParam) document.getElementById('filterType').value = typeParam;
            if(salaryParam) document.getElementById('filterSalary').value = salaryParam;

            applyFilter(); // Gọi hàm lọc ngay lập tức
        }

        // 4. HÀM LỌC DỮ LIỆU
        function applyFilter() {
            const locValue = document.getElementById('filterLocation').value;
            const typeValue = document.getElementById('filterType').value;
            const salaryValue = document.getElementById('filterSalary').value;

            let result = jobsDB;

            // Lọc theo địa điểm
            if (locValue !== 'all') {
                result = result.filter(job => job.loc === locValue);
            }
            
            // Lọc theo loại hình
            if (typeValue !== 'all') {
                result = result.filter(job => job.type === typeValue);
            }

            // Lọc theo lương (giả định đơn giản)
            if (salaryValue === 'high') {
                result = result.filter(job => job.salary.includes('25') || job.salary.includes('30') || job.salary.includes('$'));
            }

            renderJobs(result);
        }

        function resetFilter() {
            document.getElementById('filterLocation').value = 'all';
            document.getElementById('filterType').value = 'all';
            document.getElementById('filterSalary').value = 'all';
            
            // Xóa tham số trên URL
            window.history.pushState({}, document.title, window.location.pathname);
            
            renderJobs(jobsDB);
        }

        // Bắt đầu chạy
        init();
    </script>
</body>
</html>
