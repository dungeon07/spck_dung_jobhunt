<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">JobHunt</a>
            <div class="ms-auto"><a href="jobs.html" class="btn btn-outline-primary">Quay lại tìm việc</a></div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card border-0 shadow-sm p-4">
                    <h3>Chỉnh sửa Profile & CV</h3>
                    <hr>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">Họ tên hiển thị</label>
                            <input type="text" class="form-control" id="profName">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chuyên môn</label>
                            <input type="text" class="form-control" placeholder="VD: Senior Frontend Developer">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Upload CV (PDF)</label>
                            <input type="file" class="form-control" id="cvFile" accept=".pdf">
                            <div class="form-text">Nhà tuyển dụng sẽ xem file này khi bạn ứng tuyển.</div>
                        </div>
                        <button type="submit" class="btn btn-primary px-5">Cập nhật hồ sơ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
