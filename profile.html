<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - JobHunt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html"><i class="fas fa-briefcase"></i> JobHunt</a>
            <div class="ms-auto" id="authSection">
                <!-- Sẽ hiển thị tên bằng JS -->
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="row g-4">
            <!-- CỘT TRÁI: AVATAR & INFO NHANH -->
            <div class="col-lg-4">
                <div class="card auth-card text-center p-4">
                    <div class="profile-img-container mb-3 mx-auto">
                        <img id="avatarPreview" src="https://ui-avatars.com/api/?background=0D6EFD&color=fff&size=128" alt="Avatar">
                    </div>
                    <h4 id="sideName" class="fw-bold mb-1">Đang tải...</h4>
                    <p id="sideTitle" class="text-muted small mb-3">Chưa cập nhật tiêu đề</p>
                    <hr>
                    <div class="text-start">
                        <p class="small mb-2"><i class="fas fa-envelope me-2 text-primary"></i> <span id="sideEmail">---</span></p>
                        <p class="small mb-0"><i class="fas fa-phone me-2 text-primary"></i> <span id="sidePhone">Chưa cập nhật</span></p>
                    </div>
                </div>
            </div>

            <!-- CỘT PHẢI: FORM CHỈNH SỬA -->
            <div class="col-lg-8">
                <!-- Form thông tin -->
                <div class="card auth-card p-4 mb-4">
                    <h5 class="fw-bold mb-4 text-primary"><i class="fas fa-user-edit me-2"></i> Thông tin cá nhân</h5>
                    <form id="profileForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Họ và Tên</label>
                                <input type="text" id="editName" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Số điện thoại</label>
                                <input type="text" id="editPhone" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Tiêu đề chuyên môn</label>
                                <input type="text" id="editTitle" class="form-control" placeholder="Ví dụ: Designer / Web Developer">
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary px-4">Lưu thông tin</button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Khu vực Upload & Xem CV -->
                <div class="card auth-card p-4">
                    <h5 class="fw-bold mb-4 text-danger"><i class="fas fa-file-pdf me-2"></i> Quản lý hồ sơ (CV)</h5>
                    
                    <!-- Vùng chọn file -->
                    <div class="upload-cv-zone border border-2 border-dashed rounded-4 p-5 text-center bg-light">
                        <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                        <h6>Tải lên CV (Bản PDF)</h6>
                        <p class="text-muted small">Vui lòng chọn file dưới 2MB để lưu vào trình duyệt</p>
                        <input type="file" id="cvInput" hidden accept="application/pdf">
                        <button type="button" onclick="document.getElementById('cvInput').click()" class="btn btn-outline-primary btn-sm">Chọn File PDF</button>
                    </div>
                    
                    <!-- Hiển thị File đã lưu -->
                    <div id="cvStatus" class="mt-4 p-3 border rounded-3 d-none bg-white shadow-sm">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-file-pdf fa-2x text-danger me-3"></i>
                            <div class="flex-grow-1" style="cursor: pointer;" onclick="viewCV()">
                                <h6 class="mb-0 fw-bold" id="cvFileName">cv-cua-toi.pdf</h6>
                                <small class="text-primary"><i class="fas fa-eye me-1"></i> Bấm vào đây để xem nội dung</small>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-primary" onclick="viewCV()">Xem</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="removeCV()">Xóa</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
