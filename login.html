<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - JobHunt</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style/style.css">
</head>
<body class="login-body">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                
                <!-- --- PHẦN QUAN TRỌNG: NÚT QUAY LẠI TRANG CHỦ --- -->
                <!-- href="index.html" giúp quay lại trang chủ -->
                <a href="index.html" class="text-white text-decoration-none mb-3 d-inline-block fw-bold">
                    <i class="fas fa-arrow-left"></i> Quay lại trang chủ
                </a>
                <!-- ----------------------------------------------- -->

                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        
                        <!-- Tabs chuyển đổi -->
                        <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active fw-bold" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Đăng Nhập</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link fw-bold" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Đăng Ký</button>
                            </li>
                        </ul>

                        <!-- Nội dung Form -->
                        <div class="tab-content" id="pills-tabContent">
                            
                            <!-- 1. Form Đăng Nhập -->
                            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                                <form action="index.html"> <!-- Tạm thời để action về index để test nút submit -->
                                    <div class="mb-3">
                                        <label class="form-label text-muted small">Email</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                            <input type="email" class="form-control bg-light border-start-0" placeholder="name@example.com">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-muted small">Mật khẩu</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                            <input type="password" class="form-control bg-light border-start-0" placeholder="Nhập mật khẩu">
                                        </div>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="rememberMe">
                                            <label class="form-check-label small" for="rememberMe">Ghi nhớ tôi</label>
                                        </div>
                                        <a href="#" class="small text-decoration-none">Quên mật khẩu?</a>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">ĐĂNG NHẬP</button>
                                    
                                    <div class="text-center small text-muted">Hoặc đăng nhập bằng</div>
                                    <div class="d-flex justify-content-center gap-2 mt-2">
                                        <button type="button" class="btn btn-outline-danger btn-sm"><i class="fab fa-google"></i> Google</button>
                                        <button type="button" class="btn btn-outline-primary btn-sm"><i class="fab fa-facebook-f"></i> Facebook</button>
                                    </div>
                                </form>
                            </div>

                            <!-- 2. Form Đăng Ký -->
                            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                                <form action="index.html">
                                    <div class="mb-3">
                                        <label class="form-label text-muted small">Họ và tên</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                                            <input type="text" class="form-control bg-light border-start-0" placeholder="Nguyễn Văn A">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-muted small">Email</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                            <input type="email" class="form-control bg-light border-start-0" placeholder="name@example.com">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-muted small">Mật khẩu</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                            <input type="password" class="form-control bg-light border-start-0" placeholder="Tạo mật khẩu">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-muted small">Xác nhận mật khẩu</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-circle text-muted"></i></span>
                                            <input type="password" class="form-control bg-light border-start-0" placeholder="Nhập lại mật khẩu">
                                        </div>
                                    </div>
                                    <div class="mb-4 form-check">
                                        <input type="checkbox" class="form-check-input" id="terms">
                                        <label class="form-check-label small" for="terms">Tôi đồng ý với các điều khoản</label>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">ĐĂNG KÝ NGAY</button>
                                </form>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script tự động chuyển tab -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('tab') === 'register') {
                const registerTabBtn = document.querySelector('#pills-register-tab');
                const tabInstance = new bootstrap.Tab(registerTabBtn);
                tabInstance.show();
            }
        });
    </script>
</body>
</html>
